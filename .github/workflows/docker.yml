name: Docker Build

on:
  push:
    branches: [main, master]
    paths:
      - "Dockerfile"
      - "docker-compose.yml"
      - "nginx.conf"
      - "package.json"
      - "package-lock.json"
  pull_request:
    branches: [main, master]
    paths:
      - "Dockerfile"
      - "docker-compose.yml"
      - "nginx.conf"

jobs:
  build:
    name: Validate Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
